---
# MEV Engine ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: mev-config
  namespace: yoorquezt-demo
data:
  demo.yaml: |
    listen: ":9090"
    chain: "ethereum"
    rpc_url: "http://mockrpc:9999"
    api_token: "demo-token"
    database_url: "postgres://yoorquezt:yoorquezt-demo@postgres:5432/yoorquezt?sslmode=disable"
    redis_url: "redis://redis:6379"
    mesh_url: "http://mesh-api:8080"
    log_level: "info"
    strategies:
      arbitrage: true
      liquidation: true
      sandwich_protection: true
      intent_solving: true
      backrun: true
    relay:
      enabled: true
      mock_mode: true
---
# MEV Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mev-engine
  namespace: yoorquezt-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mev-engine
  template:
    metadata:
      labels:
        app: mev-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: mev
          image: ghcr.io/yoorquezt-labs/yoorquezt-mev:latest
          command: ["mev", "/etc/mev/demo.yaml"]
          ports:
            - containerPort: 9090
          env:
            - name: MEV_API_TOKEN
              value: "demo-token"
          volumeMounts:
            - name: config
              mountPath: /etc/mev
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: mev-config
---
apiVersion: v1
kind: Service
metadata:
  name: mev-engine
  namespace: yoorquezt-demo
spec:
  type: NodePort
  selector:
    app: mev-engine
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
---
# OFA Proxy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ofa-proxy
  namespace: yoorquezt-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ofa-proxy
  strategy:
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ofa-proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      containers:
        - name: ofa
          image: ghcr.io/yoorquezt-labs/yoorquezt-mev:latest
          command: ["yqofa"]
          ports:
            - containerPort: 9100
          env:
            - name: OFA_LISTEN
              value: ":9100"
            - name: MEV_UPSTREAM
              value: "http://mev-engine:9090"
            - name: MEV_API_TOKEN
              value: "demo-token"
            - name: OFA_REBATE_PCT
              value: "80"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9100
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ofa-proxy
  namespace: yoorquezt-demo
spec:
  type: NodePort
  selector:
    app: ofa-proxy
  ports:
    - port: 9100
      targetPort: 9100
      nodePort: 30100
---
# WebSocket Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: yoorquezt-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/yoorquezt-labs/yoorquezt-mev:latest
          command: ["yqmev", "-listen", ":9099", "-upstream", "http://mev-engine:9090", "-token", "demo-token"]
          ports:
            - containerPort: 9099
          readinessProbe:
            httpGet:
              path: /health
              port: 9099
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: yoorquezt-demo
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 9099
      targetPort: 9099
      nodePort: 30099
