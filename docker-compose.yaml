# YoorQuezt Demo Stack
# Pre-built images — no source code required
# Usage: docker compose up -d

x-mesh-image: &mesh-image
  image: ghcr.io/yoorquezt-labs/yoorquezt-mesh:latest

x-mev-image: &mev-image
  image: ghcr.io/yoorquezt-labs/yoorquezt-mev:latest

services:
  # ─── Infrastructure ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yoorquezt
      POSTGRES_PASSWORD: yoorquezt-demo
      POSTGRES_DB: yoorquezt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./configs/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yoorquezt"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Mock Blockchain RPC ──────────────────────────────
  mockrpc:
    <<: *mev-image
    entrypoint: ["mockrpc", ":9999"]
    ports:
      - "9999:9999"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Mesh Network ────────────────────────────────────
  mesh-bootstrap:
    <<: *mesh-image
    entrypoint: ["/app/bootstrap", "0.0.0.0:9000"]
    ports:
      - "9000:9000"

  mesh-node-1:
    <<: *mesh-image
    entrypoint: ["/app/node", "--config", "/app/configs/demo-node1.yaml"]
    ports:
      - "4433:4433/udp"
      - "8080:8080"
    volumes:
      - ./configs/demo-node1.yaml:/app/configs/demo-node1.yaml:ro
      - ./certs/key.pem:/app/key.pem:ro
      - ./certs/cert.pem:/app/cert.pem:ro
    environment:
      MESH_SHARED_KEY: ${MESH_SHARED_KEY:-yoorqueztdemomeshsharedkey123456}
    depends_on:
      mesh-bootstrap:
        condition: service_started
      mockrpc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  mesh-node-2:
    <<: *mesh-image
    entrypoint: ["/app/node", "--config", "/app/configs/demo-node2.yaml"]
    ports:
      - "4434:4434/udp"
      - "8081:8080"
    volumes:
      - ./configs/demo-node2.yaml:/app/configs/demo-node2.yaml:ro
      - ./certs/key.pem:/app/key.pem:ro
      - ./certs/cert.pem:/app/cert.pem:ro
    environment:
      MESH_SHARED_KEY: ${MESH_SHARED_KEY:-yoorqueztdemomeshsharedkey123456}
    depends_on:
      mesh-bootstrap:
        condition: service_started
      mockrpc:
        condition: service_healthy

  mesh-node-3:
    <<: *mesh-image
    entrypoint: ["/app/node", "--config", "/app/configs/demo-node3.yaml"]
    ports:
      - "4435:4435/udp"
      - "8082:8080"
    volumes:
      - ./configs/demo-node3.yaml:/app/configs/demo-node3.yaml:ro
      - ./certs/key.pem:/app/key.pem:ro
      - ./certs/cert.pem:/app/cert.pem:ro
    environment:
      MESH_SHARED_KEY: ${MESH_SHARED_KEY:-yoorqueztdemomeshsharedkey123456}
    depends_on:
      mesh-bootstrap:
        condition: service_started
      mockrpc:
        condition: service_healthy

  mesh-node-4:
    <<: *mesh-image
    entrypoint: ["/app/node", "--config", "/app/configs/demo-node4.yaml"]
    ports:
      - "4436:4436/udp"
      - "8083:8080"
    volumes:
      - ./configs/demo-node4.yaml:/app/configs/demo-node4.yaml:ro
      - ./certs/key.pem:/app/key.pem:ro
      - ./certs/cert.pem:/app/cert.pem:ro
    environment:
      MESH_SHARED_KEY: ${MESH_SHARED_KEY:-yoorqueztdemomeshsharedkey123456}
    depends_on:
      mesh-bootstrap:
        condition: service_started
      mockrpc:
        condition: service_healthy

  mesh-node-5:
    <<: *mesh-image
    entrypoint: ["/app/node", "--config", "/app/configs/demo-node5.yaml"]
    ports:
      - "4437:4437/udp"
      - "8084:8080"
    volumes:
      - ./configs/demo-node5.yaml:/app/configs/demo-node5.yaml:ro
      - ./certs/key.pem:/app/key.pem:ro
      - ./certs/cert.pem:/app/cert.pem:ro
    environment:
      MESH_SHARED_KEY: ${MESH_SHARED_KEY:-yoorqueztdemomeshsharedkey123456}
    depends_on:
      mesh-bootstrap:
        condition: service_started
      mockrpc:
        condition: service_healthy

  mesh-node-6:
    <<: *mesh-image
    entrypoint: ["/app/node", "--config", "/app/configs/demo-node6.yaml"]
    ports:
      - "4438:4438/udp"
      - "8085:8080"
    volumes:
      - ./configs/demo-node6.yaml:/app/configs/demo-node6.yaml:ro
      - ./certs/key.pem:/app/key.pem:ro
      - ./certs/cert.pem:/app/cert.pem:ro
    environment:
      MESH_SHARED_KEY: ${MESH_SHARED_KEY:-yoorqueztdemomeshsharedkey123456}
    depends_on:
      mesh-bootstrap:
        condition: service_started
      mockrpc:
        condition: service_healthy

  mesh-node-7:
    <<: *mesh-image
    entrypoint: ["/app/node", "--config", "/app/configs/demo-node7.yaml"]
    ports:
      - "4439:4439/udp"
      - "8086:8080"
    volumes:
      - ./configs/demo-node7.yaml:/app/configs/demo-node7.yaml:ro
      - ./certs/key.pem:/app/key.pem:ro
      - ./certs/cert.pem:/app/cert.pem:ro
    environment:
      MESH_SHARED_KEY: ${MESH_SHARED_KEY:-yoorqueztdemomeshsharedkey123456}
    depends_on:
      mesh-bootstrap:
        condition: service_started
      mockrpc:
        condition: service_healthy

  # ─── MEV Engine ───────────────────────────────────────
  mev-engine:
    <<: *mev-image
    entrypoint: ["mev", "/etc/mev/demo.yaml"]
    ports:
      - "9090:9090"
    volumes:
      - ./configs/mev-demo.yaml:/etc/mev/demo.yaml:ro
    environment:
      MEV_API_TOKEN: ${MEV_API_TOKEN:-demo-token}
      DATABASE_URL: postgres://yoorquezt:yoorquezt-demo@postgres:5432/yoorquezt?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mesh-node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── OFA Proxy ────────────────────────────────────────
  ofa-proxy:
    <<: *mev-image
    entrypoint: ["yqofa"]
    ports:
      - "9100:9100"
    environment:
      OFA_LISTEN: ":9100"
      MEV_UPSTREAM: "http://mev-engine:9090"
      MEV_API_TOKEN: ${MEV_API_TOKEN:-demo-token}
      OFA_REBATE_PCT: "80"
    depends_on:
      mev-engine:
        condition: service_healthy

  # ─── WebSocket Gateway ───────────────────────────────
  gateway:
    <<: *mev-image
    entrypoint: ["yqmev", "-listen", ":9099", "-upstream", "http://mev-engine:9090", "-token", "${MEV_API_TOKEN:-demo-token}"]
    ports:
      - "9099:9099"
    depends_on:
      mev-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9099/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Traffic Generator (Go, concurrent) ──────────────
  traffic-gen:
    <<: *mev-image
    entrypoint:
      - "trafficgen"
      - "-mesh=http://mesh-node-1:8080,http://mesh-node-2:8080,http://mesh-node-3:8080,http://mesh-node-4:8080,http://mesh-node-5:8080,http://mesh-node-6:8080,http://mesh-node-7:8080"
      - "-mev=http://mev-engine:9090"
      - "-token=${MEV_API_TOKEN:-demo-token}"
      - "-mode=daytrading"
      - "-duration=${TRAFFICGEN_DURATION:-8h}"
      - "-peak-tx-rate=${PEAK_TX_RATE:-500}"
      - "-peak-bundle-rate=${PEAK_BUNDLE_RATE:-100}"
      - "-protect-rate=5"
      - "-intent-rate=3"
      - "-workers=20"
      - "-status-addr=:9190"
    ports:
      - "9190:9190"
    depends_on:
      mev-engine:
        condition: service_healthy
    restart: unless-stopped

  # ─── Status Logger (cron-style phase snapshots) ─────
  status-logger:
    <<: *mev-image
    entrypoint:
      - "statuslog"
      - "-interval=60s"
      - "-logdir=/data/logs"
      - "-prometheus=http://prometheus:9090"
      - "-mesh=http://mesh-node-1:8080,http://mesh-node-2:8080,http://mesh-node-3:8080,http://mesh-node-4:8080,http://mesh-node-5:8080,http://mesh-node-6:8080,http://mesh-node-7:8080"
      - "-mev=http://mev-engine:9090"
      - "-token=${MEV_API_TOKEN:-demo-token}"
      - "-trafficgen=http://traffic-gen:9190"
      - "-cycle=24h"
      - "-duration=48h"
    volumes:
      - ./logs:/data/logs
    depends_on:
      mev-engine:
        condition: service_healthy
    restart: unless-stopped

  # ─── Observability ───────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9091:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - mev-engine
      - mesh-node-1

  grafana:
    image: grafana/grafana:10.4.1
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: yoorquezt
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./dashboards/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  tempo:
    image: grafana/tempo:2.4.1
    ports:
      - "3200:3200"
      - "4318:4318"
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./configs/tempo.yaml:/etc/tempo.yaml:ro

volumes:
  pgdata:
