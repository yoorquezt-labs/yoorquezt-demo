listen_addr: "0.0.0.0:4439"
bootstrap_nodes:
  - "mesh-bootstrap:9000"
chain: "ethereum"
private_key: "/app/key.pem"
cert: "/app/cert.pem"
tls_insecure: true
api_token: "demo-token"
gossip_bundle_threshold: 3
gossip_interval_seconds: 10
api_addr: "0.0.0.0:8080"
reputation:
  max_score: 100
  min_score: 0
  initial_score: 100
  reconnect_boost: 10
  good_ack_boost: 10
  timeout_penalty: 3
  invalid_block_penalty: 30
  drop_threshold: 10
  bad_peer_cleanup_minutes: 5
rate_limit_per_peer: 5000
rate_limit_window_sec: 10
