server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [".*mesh-node.*", ".*mev-engine.*"]
    relabel_configs:
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: container
      # Tag mesh nodes
      - source_labels: ['__meta_docker_container_name']
        regex: '.*mesh-node.*'
        target_label: service
        replacement: mesh
      # Tag mev engine
      - source_labels: ['__meta_docker_container_name']
        regex: '.*mev-engine.*'
        target_label: service
        replacement: mev
