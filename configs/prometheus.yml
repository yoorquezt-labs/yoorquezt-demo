global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'mesh-node-1'
    static_configs:
      - targets: ['mesh-node-1:8080']

  - job_name: 'mesh-node-2'
    static_configs:
      - targets: ['mesh-node-2:8080']

  - job_name: 'mesh-node-3'
    static_configs:
      - targets: ['mesh-node-3:8080']

  - job_name: 'mev-engine'
    static_configs:
      - targets: ['mev-engine:9090']

  - job_name: 'ofa-proxy'
    static_configs:
      - targets: ['ofa-proxy:9100']

  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:9099']
