  - job_name: 'mesh-node-4'
    authorization:
      credentials: demo-token
    static_configs:
      - targets: ['mesh-node-4:8080']

  - job_name: 'mesh-node-5'
    authorization:
      credentials: demo-token
    static_configs:
      - targets: ['mesh-node-5:8080']

  - job_name: 'mesh-node-6'
    authorization:
      credentials: demo-token
    static_configs:
      - targets: ['mesh-node-6:8080']

  - job_name: 'mesh-node-7'
